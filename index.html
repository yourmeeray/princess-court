<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여섯 보석의 궁정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0C0B16; --velvet:#181126; --velvet-2:#221733;
    --parch:#EFE6D6; --parch-dim:#BFB29A;
    --gold:#D8B978; --gold-bright:#F1D99C; --gold-deep:#A8843E;
    --line:rgba(216,185,120,.28);
    --g1:#D96A7E; --g2:#E0A95E; --g3:#E08C6B; --g4:#E8E0CE; --g5:#6F93C9; --g6:#A77FC9;
    --ok:#7FBF8F; --warn:#D98C5F; --bad:#D96A7E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:radial-gradient(1000px 700px at 50% -10%, var(--velvet-2) 0%, rgba(34,23,51,0) 60%), var(--ink);
    color:var(--parch); font-family:"Gowun Batang",serif; min-height:100vh;
    -webkit-font-smoothing:antialiased; padding:26px 16px 60px;
  }
  .wrap{max-width:900px;margin:0 auto}
  .crest{text-align:center;margin-bottom:22px}
  .crest .t{font-family:"Song Myung",serif;font-size:clamp(20px,5vw,30px);color:var(--gold-bright);letter-spacing:.14em}
  .crest .s{font-size:11px;letter-spacing:.4em;color:var(--parch-dim);margin-top:6px}
  .card{background:linear-gradient(180deg,rgba(216,185,120,.06),rgba(216,185,120,.015));
    border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:18px}
  .muted{color:var(--parch-dim)}
  .badge{display:inline-block;font-size:12px;letter-spacing:.12em;color:var(--gold);
    border:1px solid var(--line);border-radius:20px;padding:4px 12px}
  h2.sec{font-family:"Song Myung",serif;color:var(--gold-bright);font-size:18px;
    letter-spacing:.08em;margin-bottom:14px}
  button{font-family:"Gowun Batang",serif;cursor:pointer;border-radius:10px;
    border:1px solid var(--line);background:rgba(216,185,120,.08);color:var(--parch);
    padding:9px 14px;font-size:14px;transition:.2s}
  button:hover{border-color:var(--gold);background:rgba(216,185,120,.16)}
  button.gold{background:var(--gold);color:#241a06;border-color:var(--gold);font-weight:700}
  button.sm{padding:5px 10px;font-size:12.5px}
  input,select{font-family:"Gowun Batang",serif;background:rgba(0,0,0,.25);
    color:var(--parch);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px}
  input[type=number]{width:52px;text-align:center}
  input.scoreIn.ov{border-color:var(--gold);color:var(--gold-bright);font-weight:700}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--velvet-2);border:1px solid var(--gold);color:var(--parch);
    padding:10px 18px;border-radius:24px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  /* player */
  .hexwrap{display:flex;justify-content:center;margin:6px 0 14px}
  .gemrow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px dashed rgba(216,185,120,.15)}
  .gemrow b{color:var(--parch)}
  .mission{border:1px solid var(--g6);background:rgba(167,127,201,.08);border-radius:14px;padding:18px;margin-top:6px}
  .mission .h{font-family:"Song Myung",serif;color:#C9A6E4;letter-spacing:.08em;margin-bottom:8px}
  .vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:8px}
  .vote-grid button{width:100%}
  .vote-grid button.on{background:var(--gold);color:#241a06;border-color:var(--gold);font-weight:700}
  /* admin table */
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:13px;min-width:760px}
  th,td{border:1px solid rgba(216,185,120,.16);padding:7px 8px;text-align:center;white-space:nowrap}
  th{color:var(--gold);font-weight:400;letter-spacing:.05em;position:sticky;top:0;background:var(--velvet)}
  td.name{text-align:left;white-space:normal}
  .rank1{color:var(--gold-bright);font-weight:700}
  .pill{font-size:11px;padding:2px 8px;border-radius:12px;border:1px solid var(--line)}
  .link{font-size:11.5px;color:var(--gold);word-break:break-all}
  .center{text-align:center}
  .toggle{display:flex;gap:8px;align-items:center}
  .hint{font-size:12px;color:var(--parch-dim);line-height:1.7}
  /* 초대장 캐러셀 */
  .inv-carousel{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;
    padding:2px 7% 12px;scroll-padding:0 7%;-webkit-overflow-scrolling:touch}
  .inv-carousel::-webkit-scrollbar{height:6px}
  .inv-carousel::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .inv-slide{flex:0 0 86%;scroll-snap-align:center;box-sizing:border-box;
    border:1px solid var(--line);border-radius:16px;padding:16px;min-height:236px;
    background:linear-gradient(180deg,rgba(216,185,120,.06),rgba(216,185,120,.015));
    display:flex;flex-direction:column;gap:10px}
  .inv-hero{width:100%;height:148px;border-radius:12px;object-fit:cover;border:1px solid var(--line)}
  .inv-hero.ph{display:flex;align-items:center;justify-content:center;
    background:radial-gradient(90px 90px at 50% 40%, rgba(241,217,156,.28), rgba(241,217,156,0) 70%),
      linear-gradient(160deg,var(--velvet-2),var(--velvet))}
  .inv-hero.ph::after{content:'👑';font-size:42px;opacity:.5}
  .inv-hero.copy{height:auto;min-height:120px;max-height:340px;overflow-y:auto;
    padding:22px 22px;font-size:16px;line-height:2.15;color:var(--parch);
    white-space:normal;word-break:break-word;
    background:radial-gradient(120px 80px at 50% 0%, rgba(241,217,156,.10), rgba(241,217,156,0) 70%),
      linear-gradient(160deg,var(--velvet-2),var(--velvet))}
  .inv-hero.copy::-webkit-scrollbar{width:6px}
  .inv-hero.copy::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .inv-hero.copy p,.inv-desc p{margin:0 0 18px}
  .inv-hero.copy p:last-child,.inv-desc p:last-child{margin-bottom:0}
  .inv-sec{display:flex;align-items:center;gap:8px;margin:24px 0 14px;color:var(--gold)}
  .inv-sec::before,.inv-sec::after{content:'';flex:1;height:1px;
    background:linear-gradient(90deg,rgba(216,185,120,0),var(--gold-deep),rgba(216,185,120,0))}
  .inv-sec span{font-family:'Song Myung',serif;font-size:13px;letter-spacing:.14em;white-space:nowrap}
  .inv-sign{margin-top:14px;text-align:right;color:var(--gold-bright);
    font-family:'Song Myung',serif;font-size:13px;letter-spacing:.04em}
  .inv-badges{margin-top:2px}
  .gembadge{display:inline-block;font-size:11px;color:var(--gold);border:1px solid var(--line);
    border-radius:12px;padding:3px 10px;margin:0 5px 7px 0}
  .inv-badges{line-height:2}
  .inv-title{font-family:'Song Myung',serif;color:var(--gold-bright);font-size:17px;letter-spacing:.04em}
  .inv-meta{font-size:12px;color:var(--parch-dim)}
  .inv-desc{font-size:16px;line-height:2.15}
  .inv-mission{margin-top:16px;padding:14px 16px;border:1px dashed var(--line);border-radius:10px;
    background:rgba(216,185,120,.05);font-size:15px;line-height:1.9}
  .inv-slide.locked{align-items:center;justify-content:center;text-align:center;gap:12px;
    color:var(--parch-dim);border-style:dashed;opacity:.5;filter:grayscale(.35)}
  .inv-slide.locked .lock{font-size:40px}
  .inv-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  .inv-head h2.sec{margin-bottom:0}
  .inv-navs{display:flex;gap:8px;flex:0 0 auto}
  .inv-nav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:rgba(24,17,38,.6);border:1px solid var(--line);color:var(--gold-bright);
    font-size:19px;line-height:1;padding:0 0 3px;cursor:pointer}
  .inv-nav:hover{background:var(--gold);color:#241a06;border-color:var(--gold)}
  /* 봉투 카드 */
  .inv-slide.env{align-items:center;justify-content:center;text-align:center;gap:12px;cursor:pointer;min-height:200px}
  .inv-slide.env .inv-badges{margin-top:0}
  .env-note{color:var(--gold);font-size:13px;margin-top:2px}
  .env-open{margin-top:6px}
  /* 초대장 모달 */
  .modal-back{position:fixed;inset:0;background:rgba(6,5,12,.72);display:flex;align-items:center;
    justify-content:center;padding:20px;z-index:100}
  .modal-letter{position:relative;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;
    background:linear-gradient(180deg,var(--velvet-2),var(--velvet));border:1px solid var(--gold);
    border-radius:16px;padding:30px 26px 28px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal-letter .inv-hero.copy{max-height:none}
  .modal-x{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;
    background:rgba(0,0,0,.2);border:1px solid var(--line);color:var(--parch);font-size:14px;cursor:pointer;padding:0}
  .modal-x:hover{border-color:var(--gold);color:var(--gold-bright)}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="crest"><div class="t">여섯 보석의 궁정</div><div class="s">THE COURT OF SIX JEWELS</div></div>
  <div class="card"><p class="muted center">불러오는 중…</p></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===== 설정: 배포한 Apps Script /exec URL 을 여기에 붙여넣으세요 ===== */
const API_URL = "https://script.google.com/macros/s/AKfycbwdFOvcE6q_qjN79v1cGFZf4cPXQJshXpCqoGUgCkLnYhxpBoKEHx06CDM9LU7EjYCX/exec";

const GEMS = [
  {k:'grace', ko:'우아', c:'var(--g1)', em:'🩰'},
  {k:'craft', ko:'솜씨', c:'var(--g2)', em:'🧺'},
  {k:'taste', ko:'미각', c:'var(--g3)', em:'🍪'},
  {k:'poise', ko:'품위', c:'var(--g4)', em:'🍽'},
  {k:'wit',   ko:'지혜', c:'var(--g5)', em:'💎'},
  {k:'charm', ko:'매력', c:'var(--g6)', em:'💞'},
];
const VOTE_GEMS = ['grace','craft','taste','poise'];   // 항목투표 채점 (지혜·매력은 퀴즈 합산)
function gemBadges(gemStr){
  return String(gemStr||'').split(',').map(s=>s.trim()).filter(Boolean).map(k=>{
    const g = GEMS.find(x=>x.k===k); return g?`<span class="gembadge">${g.em} ${g.ko}</span>`:'';
  }).join(' ');
}
/* 초대장 문구를 편지처럼 꾸며 렌더 (── 제목 ── → 구분선 라벨, — 서명 → 서명) */
function formatCopy(raw){
  const lines = String(raw==null?'':raw).split('\n');
  let out = '', para = [];
  const flush = ()=>{ if(para.length){ out += `<p>${para.join(' ')}</p>`; para = []; } };
  lines.forEach(ln=>{
    const t = ln.trim(); let m;
    if(t === ''){ flush(); }
    else if((m = t.match(/^[─—–-]{2,}\s*(.+?)\s*[─—–-]{2,}$/))){ flush(); out += `<div class="inv-sec"><span>${esc(m[1])}</span></div>`; }
    else if(/^[—–]\s/.test(t)){ flush(); out += `<div class="inv-sign">${esc(t)}</div>`; }
    else { para.push(esc(t)); }
  });
  flush();
  return out;
}
/* 초대장 모달 열기 (ctx: 항목투표 컨텍스트) */
function invModal(inv, ctx){
  if(!inv) return;
  ctx = ctx || {};
  const meta = [esc(inv.time||''), esc(inv.place||'')].filter(Boolean).join(' · ');
  const hero = inv.image
    ? `<img src="${esc(inv.image)}" class="inv-hero" alt="">`
    : (inv.description ? `<div class="inv-hero copy">${formatCopy(inv.description)}</div>` : '');

  // 이 초대장의 항목 투표 (투표 열림 + 이 초대장이 vote-gem일 때만)
  let voteHTML = '';
  const voteGems = String(inv.gem||'').split(',').map(s=>s.trim()).filter(k=>VOTE_GEMS.includes(k));
  if(ctx.gem_voting_open && voteGems.length){
    const cand = ctx.others || [];
    const mgv = ctx.my_gem_votes || {};
    const RP = ctx.rank_points || [5,3,1];
    voteHTML = voteGems.map(gk=>{
      const g = GEMS.find(x=>x.k===gk);
      const mv = mgv[gk] || ['','',''];
      const prompt = inv.vote_prompt || `이 자리에서 ${g?g.ko:''}이 가장 빛난 영애를 1·2·3위로 뽑아주세요.`;
      const sel = (rank,val)=>`<select class="ivSel" data-cat="${gk}" data-rank="${rank}">
          <option value="">—</option>
          ${cand.map(o=>`<option value="${esc(o.id)}" ${String(val)===String(o.id)?'selected':''}>${esc(o.princess)}</option>`).join('')}
        </select>`;
      return `<div class="inv-vote" data-cat="${gk}">
        <div class="inv-sec"><span>${g?g.em+' '+g.ko:''} 투표</span></div>
        <p class="hint" style="margin-bottom:10px">${esc(prompt)}<br><b>1위 ${RP[0]}점 · 2위 ${RP[1]}점 · 3위 ${RP[2]}점</b> (본인 제외)</p>
        <div class="row" style="justify-content:center">
          <span class="muted" style="font-size:12px">1위</span>${sel(1,mv[0])}
          <span class="muted" style="font-size:12px">2위</span>${sel(2,mv[1])}
          <span class="muted" style="font-size:12px">3위</span>${sel(3,mv[2])}
        </div>
        <div class="center" style="margin-top:12px"><button class="gold sm ivSubmit" data-cat="${gk}">투표 제출</button></div>
        <p class="hint center ivMsg" style="margin-top:8px">${(mv[0]||mv[1]||mv[2])?'제출 완료 🤍 · 바꾸려면 다시 제출':''}</p>
      </div>`;
    }).join('');
  }

  const back = document.createElement('div');
  back.className = 'modal-back';
  back.innerHTML = `<div class="modal-letter">
    <button class="modal-x" aria-label="닫기">✕</button>
    <div class="inv-badges" style="margin-bottom:16px">${gemBadges(inv.gem)}</div>
    <div class="inv-title" style="font-size:21px;margin-bottom:9px">${esc(inv.title||'')}</div>
    <div class="inv-meta" style="margin-bottom:22px">${meta}${inv.address?`<br><span style="font-size:11px">${esc(inv.address)}</span>`:''}</div>
    ${hero}
    ${inv.image&&inv.description?`<div class="inv-desc">${formatCopy(inv.description)}</div>`:''}
    ${inv.pot_note?`<div class="inv-mission">🚕 ${esc(inv.pot_note).replace(/\n/g,'<br>')}</div>`:''}
    ${inv.mission?`<div class="inv-mission">📜 ${esc(inv.mission)}</div>`:''}
    ${voteHTML}
  </div>`;
  const close = ()=> back.remove();
  back.onclick = e=>{ if(e.target===back) close(); };
  back.querySelector('.modal-x').onclick = close;

  // 같은 항목 안 중복 지명 방지
  back.querySelectorAll('.ivSel').forEach(s=>{
    s.onchange = ()=>{ const cat=s.dataset.cat;
      back.querySelectorAll(`.ivSel[data-cat="${cat}"]`).forEach(x=>{ if(x!==s && x.value && x.value===s.value) x.value=''; }); };
  });
  // 투표 제출 → 점수 자동 합계(gemVote)
  back.querySelectorAll('.ivSubmit').forEach(btn=>{
    btn.onclick = async ()=>{
      const cat = btn.dataset.cat;
      const val = r => (back.querySelector(`.ivSel[data-cat="${cat}"][data-rank="${r}"]`)||{}).value || '';
      const r = await api('gemVote', {id:ctx.id, key:ctx.key, category:cat, rank1:val(1), rank2:val(2), rank3:val(3)}, true);
      const msg = back.querySelector(`.inv-vote[data-cat="${cat}"] .ivMsg`);
      if(r.ok){
        if(ctx.my_gem_votes) ctx.my_gem_votes[cat] = [val(1),val(2),val(3)];
        if(msg) msg.textContent = '제출 완료 🤍 · 바꾸려면 다시 제출';
        toast('투표 저장됨 🤍');
      } else { toast(r.error==='gem_voting_closed'?'투표가 마감되었어요':'오류가 발생했어요'); }
    };
  });

  document.body.appendChild(back);
}

const qs = new URLSearchParams(location.search);
const app = document.getElementById('app');
let playerTimer = null, adminTimer = null;  // 퀴즈 제출 현황 폴링용

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }

async function api(action, params={}, post=false){
  const all = Object.assign({action}, params);
  if(!post){
    const u = new URL(API_URL);
    Object.keys(all).forEach(k=>u.searchParams.set(k, all[k]));
    const r = await fetch(u); return r.json();
  } else {
    const r = await fetch(API_URL, {method:'POST', body:JSON.stringify(all)});
    return r.json();
  }
}

function crest(){ return `<div class="crest"><div class="t">여섯 보석의 궁정</div><div class="s">THE COURT OF SIX JEWELS</div></div>`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------------- 세션 ---------------- */
function saveSession(s){ try{ localStorage.setItem('court_session', JSON.stringify(s)); }catch(e){} }
function loadSession(){ try{ return JSON.parse(localStorage.getItem('court_session')); }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem('court_session'); }catch(e){} }
function logout(){ if(playerTimer){clearInterval(playerTimer);playerTimer=null;} if(adminTimer){clearInterval(adminTimer);adminTimer=null;} clearSession(); renderLogin(); }
function logoutBar(){ return `<div class="center" style="margin-top:6px"><button class="sm" id="logoutBtn">로그아웃</button></div>`; }
function bindLogout(){ const b=document.getElementById('logoutBtn'); if(b) b.onclick=logout; }

/* ---------------- 라우팅 ---------------- */
async function boot(){
  if(API_URL.indexOf('PASTE_')===0){
    app.innerHTML = crest()+`<div class="card"><h2 class="sec">설정 필요</h2><p class="hint">court.html 안 <b>API_URL</b> 에 배포한 Apps Script /exec 주소를 넣어주세요.</p></div>`;
    return;
  }
  const s = loadSession();
  if(s && s.role==='admin')  return renderAdmin(s.key);
  if(s && s.role==='player') return renderPlayer(s.id, s.key);
  renderLogin();
}

/* ---------------- 로그인 화면 ---------------- */
async function renderLogin(){
  let roster = [];
  try{ const r = await api('roster', {}); if(r.ok) roster = r.players; }catch(e){}
  const opts = roster.map(p=>`<option value="${esc(p.id)}">${esc(p.princess||p.name)}</option>`).join('');
  app.innerHTML = crest()+`
   <div class="card" style="max-width:380px;margin:0 auto">
     <h2 class="sec">입궁</h2>
     <p class="hint" style="margin-bottom:14px">이름을 고르고 비밀번호를 입력하세요.</p>
     <div style="display:flex;flex-direction:column;gap:12px">
       <select id="who" style="width:100%">
         <option value="">— 영애를 선택 —</option>
         ${opts}
         <option value="__admin__">집사 (운영자)</option>
       </select>
       <input type="password" id="pw" placeholder="비밀번호" style="width:100%">
       <button class="gold" id="loginBtn">입궁하기</button>
       <p class="hint" id="loginMsg" style="color:var(--bad);min-height:16px"></p>
     </div>
   </div>`;
  const doLogin = async ()=>{
    const who = document.getElementById('who').value;
    const pw  = document.getElementById('pw').value.trim();
    const msg = document.getElementById('loginMsg');
    if(!who){ msg.textContent='이름을 선택해 주세요.'; return; }
    if(!pw){ msg.textContent='비밀번호를 입력해 주세요.'; return; }
    msg.textContent='확인 중…';
    try{
      if(who==='__admin__'){
        const d = await api('all', {key:pw});
        if(d.ok){ saveSession({role:'admin', key:pw}); renderAdmin(pw); }
        else msg.textContent='비밀번호가 올바르지 않아요.';
      } else {
        const d = await api('me', {id:who, key:pw});
        if(d.ok){ saveSession({role:'player', id:who, key:pw}); renderPlayer(who, pw); }
        else msg.textContent='비밀번호가 올바르지 않아요.';
      }
    }catch(e){ msg.textContent='연결에 문제가 있어요. 잠시 후 다시 시도해 주세요.'; }
  };
  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}

/* 퀴즈 미디어: 오디오 확장자면 플레이어, 아니면 이미지 */
function quizMedia(url){
  if(!url) return '';
  if(/\.(mp3|m4a|ogg|wav|aac)(\?|$)/i.test(url)) return `<audio controls preload="none" src="${esc(url)}" style="width:100%;margin:10px 0"></audio>`;
  return `<img src="${esc(url)}" alt="" style="width:100%;border-radius:12px;margin:10px 0">`;
}
/* 영애 화면 퀴즈 카드 (제출 단계 / 공개 단계) */
function renderQuizCard(q){
  const badge = q.gem ? gemBadges(q.gem) : '';
  const half = (q.max!==''&&q.max!=null) ? Math.floor(Number(q.max)/2) : 0;
  const pts = (q.max!=='' && q.max!=null)
    ? `<span class="gembadge">${esc(q.max)}점${q.has_hint?` · 힌트 시 ${half}점`:''}${q.min_len?` · ${esc(q.min_len)}자 미만 ${half}점`:''}</span>`
    : (q.gem?'':`<span class="gembadge">점수 미반영</span>`);
  const meta = (badge||pts) ? `<div class="inv-badges" style="margin-bottom:10px">${badge} ${pts}</div>` : '';
  let inner = `<h2 class="sec">${esc(q.label||'퀴즈')}</h2>${meta}${quizMedia(q.media)}`;
  if(q.revealed){
    if(q.answer) inner += `<p class="hint" style="margin:6px 0 12px">정답: <b style="color:var(--gold-bright)">${esc(q.answer)}</b></p>`;
    inner += `<div class="scroll"><table><tr><th>영애</th><th>답변</th></tr>${
      (q.responses||[]).map(r=>`<tr><td class="name">${esc(r.name)}${r.hint?' <span class="pill">힌트</span>':''}</td><td>${esc(r.answer)}</td></tr>`).join('')
    }</table></div>`;
    return `<div class="card">${inner}</div>`;
  }
  if(q.my_hint && q.media2){
    inner += `<p class="hint" style="margin:8px 0 2px">🔔 힌트 — 정답 시 ${half}점</p>${quizMedia(q.media2)}`;
  } else if(q.has_hint){
    inner += `<div class="center" style="margin:8px 0"><button class="sm hintBtn" data-qid="${esc(q.quiz_id)}">🔔 힌트 듣기 (정답 점수 절반)</button></div>`;
  }
  inner += `<input type="text" id="qans_${esc(q.quiz_id)}" class="quizAns" placeholder="정답을 적어주세요" value="${esc(q.my_answer||'')}" style="width:100%">
    <div class="center" style="margin-top:10px"><button class="gold sm quizSub" data-qid="${esc(q.quiz_id)}">${q.my_answer?'답변 수정':'제출'}</button></div>
    <p class="hint center" style="margin-top:10px">${q.my_answer?'제출 완료 🤍 · ':''}${q.submitted}/${q.total}명 제출${q.my_answer?' · 모두 제출하면 집사가 정답을 공개합니다':''}</p>`;
  return `<div class="card">${inner}</div>`;
}

/* 챔피언 점수표 카드 (균형 1위 / 합계 1위) */
function champCard(title, c, scale){
  if(!c) return '';
  let rows = '';
  GEMS.forEach(g=>{ rows += `<div class="gemrow"><span>${g.em} ${g.ko}</span><b>${c.gems[g.k]}점</b></div>`; });
  return `<div class="card">
    <h2 class="sec">${title}</h2>
    <div style="font-family:'Song Myung';font-size:20px;color:var(--gold-bright);text-align:center;margin-bottom:4px">${esc(c.princess)}</div>
    <div class="hexwrap">${hexSVG(c.gems, scale)}</div>
    ${rows}
    <div class="gemrow" style="border:none;margin-top:8px"><span>합계</span><b>${c.total}</b></div>
    <div class="gemrow" style="border:none"><span>균형 점수</span><b style="color:var(--gold-bright)">${c.balance}</b></div>
  </div>`;
}

/* ---------------- 영애 화면 ---------------- */
async function renderPlayer(id, key){
  if(playerTimer){ clearInterval(playerTimer); playerTimer=null; }
  const d = await api('me', {id, key});
  if(!d.ok){ clearSession(); return renderLogin(); }

  let html = crest();
  html += `<div class="card"><div class="row" style="justify-content:space-between">
     <div><div style="font-family:'Song Myung';font-size:22px;color:var(--gold-bright)">${esc(d.princess||d.name)}</div>
     <div class="muted" style="font-size:12px;margin-top:4px">${esc(d.name||'')}</div></div>

  if(d.invitations && d.invitations.length){
    let slides = '';
    d.invitations.forEach((inv,idx)=>{
      if(inv.locked){
        slides += `<div class="inv-slide locked"><span class="lock">🔒</span><div>봉인된 초대장<br><span style="font-size:11px">집사가 열면 공개됩니다</span></div></div>`;
        return;
      }
      const meta = [esc(inv.time||''), esc(inv.place||'')].filter(Boolean).join(' · ');
      slides += `<div class="inv-slide env" data-idx="${idx}" role="button" tabindex="0">
        <div class="inv-badges">${gemBadges(inv.gem)}</div>
        <div class="inv-title">${esc(inv.title||'')}</div>
        <div class="inv-meta">${meta}</div>
        <div class="env-note">✉️ 초대장이 도착했습니다</div>
        <button class="gold sm env-open" type="button">열어보기</button>
      </div>`;
    });
    const nav = d.invitations.length>1;
    html += `<div class="card">
      <div class="inv-head"><h2 class="sec">초대장</h2>
        ${nav?`<div class="inv-navs"><button class="inv-nav" id="invPrev" aria-label="이전 초대장">‹</button><button class="inv-nav" id="invNext" aria-label="다음 초대장">›</button></div>`:''}
      </div>
      <div class="inv-carousel" id="invCarousel">${slides}</div></div>`;
  }

  // 활성 퀴즈 (제출 / 공개)
  if(d.quizzes && d.quizzes.length){
    d.quizzes.forEach(q=>{ html += renderQuizCard(q); });
  }

  // 우승 발표
  if(d.winner_revealed){
    html += `<div class="card center">${d.am_i_winner
      ? `<div style="font-family:'Song Myung';font-size:24px;color:var(--gold-bright)">👑 대관을 축하드립니다</div><p class="muted" style="margin-top:8px">오늘의 공주는 영애님이십니다.</p>`
      : `<p class="muted">대관식이 끝났어요. 오늘의 공주가 정해졌습니다.</p>`}</div>`;
  }

  // 점수 (공개 시)
  if(d.reveal && d.gems){
    html += `<div class="card"><h2 class="sec">나의 육각형</h2><div class="hexwrap">${hexSVG(d.gems, d.scale)}</div>`;
    GEMS.forEach(g=>{ html += `<div class="gemrow"><span>${g.ko}</span><b>${d.gems[g.k]}점</b></div>`; });
    html += `<div class="gemrow" style="border:none;margin-top:8px"><span>합계</span><b>${d.total}</b></div>
             <div class="gemrow" style="border:none"><span>균형 점수</span><b style="color:var(--gold-bright)">${d.balance}</b></div>
             <p class="hint" style="margin-top:8px">점수는 항목별 투표로 산정돼요. 균형 점수 = 합계 − (최고−최저). 고르게 빛날수록 높아요.</p></div>`;
  } else {
    html += `<div class="card center"><p class="muted">점수는 대관식에서 공개됩니다. ✨</p></div>`;
  }

  // 전체 점수판 — 챔피언 2명 (공개 시, 전원 0점이면 숨김)
  if(d.reveal && d.champions && d.champions.score && d.champions.score.total > 0){
    html += champCard('👑 가장 고르게 빛난 분 · 균형 1위', d.champions.balance, d.scale);
    html += champCard('✨ 최고 점수 · 합계 1위', d.champions.score, d.scale);
  }

  // 비밀 미션 (집사의 영애만)
  if(d.is_owner){
    html += `<div class="card"><div class="mission"><div class="h">🤫 집사의 영애 — 비밀 임무</div>
      <p style="line-height:1.8">${esc(d.mission||'(임무가 곧 전달됩니다)').replace(/\n/g,'<br>')}</p>
      <p class="hint" style="margin-top:10px">상태: <b>${esc(d.mission_status||'진행 중')}</b><br>아무에게도 들키지 마세요. 끝까지 정체를 숨기시길.</p></div></div>`;
  }

  // 투표
  if(d.voting_open){
    html += `<div class="card"><h2 class="sec">집사의 영애는 누구일까요?</h2>
      <p class="hint">하루를 돌아보고, 집사가 남몰래 모신 단 한 분을 지목해 주세요.</p>
      <div class="vote-grid" id="voteGrid">${
        d.others.map(o=>`<button data-id="${esc(o.id)}" class="voteBtn ${d.voted&&d.my_guess===o.id?'on':''}">${esc(o.princess)}</button>`).join('')
      }</div>
      <p class="hint" id="voteMsg" style="margin-top:10px">${d.voted?'투표가 접수되었어요. 바꾸려면 다시 눌러주세요.':''}</p></div>`;
  }

  // 항목별 투표는 각 클래스 초대장 모달 하단으로 이동됨 (invModal 참고)

  app.innerHTML = html + logoutBar();
  bindLogout();

  // 캐러셀: 가장 최근(오더 큰) 공개된 초대장으로 스크롤 + 화살표 조작
  const car = document.getElementById('invCarousel');
  if(car && d.invitations){
    let target = -1;
    d.invitations.forEach((inv,i)=>{ if(!inv.locked) target = i; });
    const s = car.querySelectorAll('.inv-slide')[target];
    if(s) car.scrollLeft = s.offsetLeft - (car.clientWidth - s.clientWidth)/2;
    const step = ()=>{ const s0 = car.querySelector('.inv-slide'); return s0 ? s0.offsetWidth + 14 : car.clientWidth; };
    const prev = document.getElementById('invPrev'), next = document.getElementById('invNext');
    if(prev) prev.onclick = ()=> car.scrollBy({left:-step(), behavior:'smooth'});
    if(next) next.onclick = ()=> car.scrollBy({left: step(), behavior:'smooth'});
    // 봉투 클릭 → 모달로 편지 열기 (+ 항목투표 컨텍스트)
    const voteCtx = {id, key, gem_voting_open:!!d.gem_voting_open, others:d.others||[], my_gem_votes:d.my_gem_votes||{}, rank_points:d.rank_points};
    car.querySelectorAll('.inv-slide.env').forEach(el=>{
      const open = ()=> invModal(d.invitations[+el.dataset.idx], voteCtx);
      el.onclick = open;
      el.onkeydown = e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); } };
    });
  }

  if(d.voting_open){
    document.querySelectorAll('.voteBtn').forEach(b=>{
      b.onclick = async ()=>{
        const g = b.getAttribute('data-id');
        const r = await api('vote', {id, key, guess:g}, true);
        if(r.ok){
          document.querySelectorAll('.voteBtn').forEach(x=>x.classList.remove('on'));
          b.classList.add('on');
          document.getElementById('voteMsg').textContent = '투표가 접수되었어요. 바꾸려면 다시 눌러주세요.';
          toast('지목 완료 🤍');
        } else { toast(r.error==='voting_closed'?'투표가 마감되었어요':'오류가 발생했어요'); }
      };
    });
  }

  // 힌트 듣기 (되돌릴 수 없음 → 확인 후 기록)
  document.querySelectorAll('.hintBtn').forEach(b=>{
    b.onclick = async ()=>{
      if(!confirm('힌트를 들으면 이 퀴즈의 정답 점수가 절반이 돼요. 들을까요?')) return;
      const r = await api('useHint', {id, key, quiz_id:b.dataset.qid}, true);
      if(r.ok){ renderPlayer(id, key); }
      else { toast(r.error==='closed'?'지금은 힌트를 들을 수 없어요':'오류가 발생했어요'); }
    };
  });

  // 퀴즈 답 제출
  document.querySelectorAll('.quizSub').forEach(b=>{
    b.onclick = async ()=>{
      const qid = b.dataset.qid;
      const ans = (document.getElementById('qans_'+qid)||{}).value || '';
      if(!ans.trim()){ toast('답을 적어주세요'); return; }
      const r = await api('submitAnswer', {id, key, quiz_id:qid, answer:ans}, true);
      if(r.ok){ toast('제출 완료 🤍'); renderPlayer(id, key); }
      else { toast(r.error==='submit_closed'?'제출이 마감되었어요':(r.error==='revealed'?'이미 공개되었어요':'오류가 발생했어요')); }
    };
  });

  // 제출 진행 중인 퀴즈가 있으면 5초마다 새로고침(제출 현황·정답 공개·초대장 등장 반영).
  // 입력 중이면 건너뜀(타이핑 중 내용 날아감 방지).
  const quizLive = (d.quizzes||[]).some(q=>q.submit_open && !q.revealed);
  if(quizLive){
    playerTimer = setInterval(()=>{
      const a = document.activeElement;
      if(a && a.classList && a.classList.contains('quizAns')) return;
      renderPlayer(id, key);
    }, 5000);
  }
}

/* 육각형 레이더 SVG */
function hexSVG(gems, scale){
  scale = Number(scale)||10;
  const cx=110, cy=110, R=88;
  const ang = i => (-90 + i*60) * Math.PI/180;
  const pt = (i,r)=>[cx + r*Math.cos(ang(i)), cy + r*Math.sin(ang(i))];
  let grid='';
  [0.25,0.5,0.75,1].forEach(f=>{
    const p = GEMS.map((_,i)=>pt(i,R*f).map(n=>n.toFixed(1)).join(',')).join(' ');
    grid += `<polygon points="${p}" fill="none" stroke="rgba(216,185,120,.18)"/>`;
  });
  let axes='', labels='';
  GEMS.forEach((g,i)=>{
    const e=pt(i,R), l=pt(i,R+16);
    axes += `<line x1="${cx}" y1="${cy}" x2="${e[0].toFixed(1)}" y2="${e[1].toFixed(1)}" stroke="rgba(216,185,120,.18)"/>`;
    labels += `<text x="${l[0].toFixed(1)}" y="${l[1].toFixed(1)}" fill="var(--parch-dim)" font-size="11" text-anchor="middle" dominant-baseline="middle" font-family="Song Myung">${g.ko}</text>`;
  });
  const vpts = GEMS.map((g,i)=>pt(i, R*(Number(gems[g.k])||0)/scale).map(n=>n.toFixed(1)).join(',')).join(' ');
  return `<svg viewBox="0 0 220 220" width="240" height="240">${grid}${axes}
    <polygon points="${vpts}" fill="rgba(216,185,120,.28)" stroke="var(--gold-bright)" stroke-width="2"/>
    ${labels}</svg>`;
}

        ${inv.always_open
          ? `<span class="pill">항상 공개</span>`
          : `<input type="checkbox" class="invChk" data-inv="${esc(inv.inv_id)}" ${inv.is_open?'checked':''}>`}
      </label>`;
    });
    html += `</div><p class="hint" style="margin-top:8px">켜면 영애 화면에 해당 초대장이 나타나요. (전체 이벤트=항상 공개)</p>`;
  }
  html += `</div>`;

  // 퀴즈 진행 (제출 · 공개)
  html += `<div class="card"><h2 class="sec">퀴즈 진행 (제출 · 공개)</h2>`;
  if(!d.quizzes || !d.quizzes.length){ html += `<p class="muted">Quizzes 탭이 아직 없어요.</p>`; }
  else {
    d.quizzes.forEach(q=>{
      const ans = (d.quiz_answers && d.quiz_answers[q.quiz_id]) || [];
      html += `<div style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px">
        <div class="row" style="justify-content:space-between">
          <b>${esc(q.label||q.quiz_id)}</b>
          <span class="muted" style="font-size:12px">${ans.length}/${d.players.length} 제출</span>
        </div>
        <div class="row" style="gap:16px;margin-top:8px">
          <label class="toggle"><input type="checkbox" class="qOpen" data-qid="${esc(q.quiz_id)}" ${truthy(q.submit_open)?'checked':''}> 제출 받기</label>
          <label class="toggle"><input type="checkbox" class="qReveal" data-qid="${esc(q.quiz_id)}" ${truthy(q.revealed)?'checked':''}> 정답 공개${q.reveal_inv?` (+ ${esc(q.reveal_inv)} 초대장)`:''}</label>
        </div>
        ${ans.length?`<div class="scroll" style="margin-top:8px"><table><tr><th>영애</th><th>답변</th></tr>${ans.map(a=>`<tr><td class="name">${esc(a.name)}${a.hint?' <span class="pill">힌트</span>':''}</td><td>${esc(a.answer)}</td></tr>`).join('')}</table></div>`:''}
      </div>`;
    });
    html += `<p class="hint">"제출 받기"를 켜면 영애 화면에 퀴즈가 떠요. 모두 제출되면 "정답 공개"를 켜세요(연결된 초대장이 있으면 함께 열립니다). 이 화면은 제출 중 자동 새로고침돼요.</p>`;
  }
  html += `</div>`;

  // 퀴즈 점수 (지혜·매력)
  html += `<div class="card"><h2 class="sec">퀴즈 점수 (지혜·매력)</h2>`;
  if(!d.quizzes || !d.quizzes.length){ html += `<p class="muted">Quizzes 탭이 아직 없어요.</p>`; }
  else {
    html += `<div class="scroll"><table><tr><th>영애</th>${d.quizzes.map(q=>{
      const hasMax = q.max!==''&&q.max!=null;
      const half = hasMax?Math.floor(Number(q.max)/2):0;
      return `<th title="${esc(q.gem)}">${esc(q.label||q.quiz_id)}${hasMax?`<br><span style="font-size:10px">(${esc(q.max)}점${q.media2?` / 힌트 ${half}점`:''})</span>`:''}</th>`;
    }).join('')}</tr>`;
    d.players.forEach(p=>{
      const sc = (d.quiz_scores && d.quiz_scores[p.id]) || {};
      html += `<tr><td class="name">${esc(p.princess||p.name)}</td>${d.quizzes.map(q=>{
        const v = sc[q.quiz_id];
        if(q.max===''||q.max==null)
          return `<td><input type="number" min="0" value="${v!=null?esc(v):''}" data-pid="${esc(p.id)}" data-qid="${esc(q.quiz_id)}" class="quizIn"></td>`;
        const ent = ((d.quiz_answers&&d.quiz_answers[q.quiz_id])||[]).find(a=>String(a.pid)===String(p.id));
        let pmax = Number(q.max);
        if(ent&&ent.hint) pmax = Math.floor(pmax/2);
        const alen = ent ? String(ent.answer||'').replace(/\s/g,'').length : 0;
        const short = q.min_len!==''&&q.min_len!=null&&ent&&alen<Number(q.min_len);
        if(short) pmax = Math.floor(pmax/2);
        const notes = [ent&&ent.hint?'힌트 사용':'', q.min_len!==''&&q.min_len!=null&&ent?`${alen}자${short?' (기준 미달)':''}`:''].filter(Boolean).join(' · ');
        return `<td><input type="checkbox" class="quizOX" data-pid="${esc(p.id)}" data-qid="${esc(q.quiz_id)}" data-max="${pmax}" ${Number(v)>0?'checked':''} title="${notes?notes+' — ':''}체크 시 ${pmax}점">${ent&&ent.hint?'<span style="font-size:10px">🔔</span>':''}${short?'<span style="font-size:10px">✂️</span>':''}</td>`;
      }).join('')}</tr>`;
    });
    html += `</table></div><p class="hint" style="margin-top:8px">gem이 wit인 퀴즈 합=지혜, charm 합=매력. <b>체크=정답(배점 자동 부여, 🔔 힌트 사용자는 절반), 해제=0점.</b> 배점 없는 퀴즈만 숫자 직접 입력. 바꾸면 자동 저장돼요.</p>`;
  }
  html += `</div>`;

  // 역할/미션
  html += `<div class="card"><h2 class="sec">역할 · 비밀 미션</h2><div class="scroll"><table>
    <tr><th>영애</th><th>집사의 영애</th><th>팟장</th><th>미션 내용</th><th>상태</th></tr>`;
  d.players.forEach(p=>{
    html += `<tr>
      <td class="name">${esc(p.princess||p.name)}</td>
      <td><input type="checkbox" class="ownerChk" data-id="${esc(p.id)}" ${p.is_owner?'checked':''}></td>
      <td><input type="checkbox" class="leadChk" data-id="${esc(p.id)}" ${p.is_leader?'checked':''}></td>
      <td><input type="text" class="missIn" data-id="${esc(p.id)}" value="${esc(p.mission)}" placeholder="비밀 미션…" style="width:200px"></td>
      <td><select class="statSel" data-id="${esc(p.id)}">
        ${['진행 중','완수','오후 발각','오전 발각'].map(s=>`<option ${p.mission_status===s?'selected':''}>${s}</option>`).join('')}
      </select></td></tr>`;
  });
  html += `</table></div><p class="hint" style="margin-top:8px">집사의 영애는 한 명만 지정돼요(다른 체크는 자동 해제). 미션 칸은 Enter로 저장.</p></div>`;

  // 투표 집계
  html += `<div class="card"><h2 class="sec">투표 집계 — "집사의 영애 지목"</h2>`;
  if(d.votes.length===0){ html += `<p class="muted">아직 투표가 없어요.</p>`; }
  else {
    const correct = d.votes.filter(v=>v.correct).length;
    html += `<p class="hint">정답자 ${correct} / ${d.votes.length}명</p><div class="scroll"><table>
      <tr><th>영애</th><th>지목</th><th>정답?</th></tr>
      ${d.votes.map(v=>`<tr><td class="name">${esc(v.voter)}</td><td>${esc(v.guess)}</td>
        <td>${v.correct===null?'-':(v.correct?'✅':'❌')}</td></tr>`).join('')}</table></div>`;
  }
  html += `</div>`;

  // 비밀번호 배포
  html += `<div class="card"><h2 class="sec">영애별 비밀번호</h2><p class="hint">각 영애에게 <b>이름과 비밀번호</b>를 알려주세요. 사이트에서 이름을 고르고 이 비밀번호로 입궁합니다. (집사는 로그인 시 "집사"를 골라 admin key 입력)</p><div class="scroll"><table>
    <tr><th>영애</th><th>비밀번호</th><th></th></tr>
    ${d.players.map(p=>{
      return `<tr><td class="name">${esc(p.princess||p.name)}</td><td class="link">${esc(p.key)}</td>
        <td><button class="sm copyBtn" data-copy="${esc(p.key)}">복사</button></td></tr>`;
    }).join('')}
  </table></div></div>`;

  app.innerHTML = html + logoutBar();
  bindAdmin(key);
  bindLogout();

  // 제출 받는 중인 퀴즈가 있으면 6초마다 현황 새로고침(입력 편집 중이면 건너뜀).
  const quizLive = (d.quizzes||[]).some(q=>truthy(q.submit_open) && !truthy(q.revealed));
  if(quizLive){
    adminTimer = setInterval(()=>{
      const a = document.activeElement;
      if(a && (a.tagName==='INPUT' || a.tagName==='SELECT')) return;
      renderAdmin(key);
    }, 6000);
  }
}

function bindAdmin(key){
  const save = async (params)=>{ const r = await api(params.action, Object.assign({key},params), true); toast(r.ok?'저장됐어요':'오류: '+(r.error||'')); return r; };

  document.getElementById('tReveal').onchange  = e => save({action:'setToggle', name:'reveal_scores',   value: e.target.checked});
  document.getElementById('tVote').onchange    = e => save({action:'setToggle', name:'voting_open',     value: e.target.checked});
  document.getElementById('tGemVote').onchange = e => save({action:'setToggle', name:'gem_voting_open', value: e.target.checked});

  document.querySelectorAll('.scoreIn').forEach(inp=>{
    inp.onchange = ()=> save({action:'setScore', id:inp.dataset.id, gem:inp.dataset.gem, value:inp.value});
  });
  document.querySelectorAll('.ownerChk').forEach(c=>{
    c.onchange = async ()=>{ await save({action:'setField', id:c.dataset.id, field:'is_owner', value:c.checked}); if(c.checked) setTimeout(()=>renderAdmin(key),400); };
  });
  document.querySelectorAll('.leadChk').forEach(c=>{
    c.onchange = ()=> save({action:'setField', id:c.dataset.id, field:'is_leader', value:c.checked});
  });
  document.querySelectorAll('.missIn').forEach(inp=>{
    inp.onkeydown = e=>{ if(e.key==='Enter') save({action:'setField', id:inp.dataset.id, field:'mission', value:inp.value}); };
  });
  document.querySelectorAll('.statSel').forEach(sel=>{
    sel.onchange = ()=> save({action:'setField', id:sel.dataset.id, field:'mission_status', value:sel.value});
  });
  document.querySelectorAll('.winBtn').forEach(b=>{
    b.onclick = async ()=>{ await save({action:'setWinner', id:b.dataset.id}); setTimeout(()=>renderAdmin(key),400); };
  });
  document.querySelectorAll('.copyBtn').forEach(b=>{
    b.onclick = ()=>{ navigator.clipboard.writeText(b.dataset.copy); toast('비밀번호 복사됨'); };
  });
  document.querySelectorAll('.invChk').forEach(c=>{
    c.onchange = ()=> save({action:'setInvOpen', inv_id:c.dataset.inv, value:c.checked});
  });
  document.querySelectorAll('.quizIn').forEach(inp=>{
    inp.onchange = ()=> save({action:'setQuizScore', player_id:inp.dataset.pid, quiz_id:inp.dataset.qid, value:inp.value});
  });
  document.querySelectorAll('.quizOX').forEach(c=>{
    c.onchange = ()=> save({action:'setQuizScore', player_id:c.dataset.pid, quiz_id:c.dataset.qid, value: c.checked ? c.dataset.max : ''});
  });
  document.querySelectorAll('.qOpen').forEach(c=>{
    c.onchange = ()=> save({action:'setQuizFlag', quiz_id:c.dataset.qid, field:'submit_open', value:c.checked});
  });
  document.querySelectorAll('.qReveal').forEach(c=>{
    c.onchange = async ()=>{ await save({action:'setQuizFlag', quiz_id:c.dataset.qid, field:'revealed', value:c.checked}); setTimeout(()=>renderAdmin(key),400); };
  });
}

function truthy(v){ return v===true || String(v).toUpperCase()==='TRUE' || v===1 || v==='1'; }

boot();
</script>
</body>
</html>
