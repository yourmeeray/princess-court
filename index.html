<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여섯 보석의 궁정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0C0B16; --velvet:#181126; --velvet-2:#221733;
    --parch:#EFE6D6; --parch-dim:#BFB29A;
    --gold:#D8B978; --gold-bright:#F1D99C; --gold-deep:#A8843E;
    --line:rgba(216,185,120,.28);
    --g1:#D96A7E; --g2:#E0A95E; --g3:#E08C6B; --g4:#E8E0CE; --g5:#6F93C9; --g6:#A77FC9;
    --ok:#7FBF8F; --warn:#D98C5F; --bad:#D96A7E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:radial-gradient(1000px 700px at 50% -10%, var(--velvet-2) 0%, rgba(34,23,51,0) 60%), var(--ink);
    color:var(--parch); font-family:"Nanum Myeongjo",serif; min-height:100vh;
    -webkit-font-smoothing:antialiased; padding:26px 16px 60px;
  }
  .wrap{max-width:900px;margin:0 auto}
  .crest{text-align:center;margin-bottom:22px}
  .crest .t{font-family:"Song Myung",serif;font-size:clamp(20px,5vw,30px);color:var(--gold-bright);letter-spacing:.14em}
  .crest .s{font-size:11px;letter-spacing:.4em;color:var(--parch-dim);margin-top:6px}
  .card{background:linear-gradient(180deg,rgba(216,185,120,.06),rgba(216,185,120,.015));
    border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:18px}
  .muted{color:var(--parch-dim)}
  .badge{display:inline-block;font-size:12px;letter-spacing:.12em;color:var(--gold);
    border:1px solid var(--line);border-radius:20px;padding:4px 12px}
  h2.sec{font-family:"Song Myung",serif;color:var(--gold-bright);font-size:18px;
    letter-spacing:.08em;margin-bottom:14px}
  button{font-family:"Nanum Myeongjo",serif;cursor:pointer;border-radius:10px;
    border:1px solid var(--line);background:rgba(216,185,120,.08);color:var(--parch);
    padding:9px 14px;font-size:14px;transition:.2s}
  button:hover{border-color:var(--gold);background:rgba(216,185,120,.16)}
  button.gold{background:var(--gold);color:#241a06;border-color:var(--gold);font-weight:700}
  button.sm{padding:5px 10px;font-size:12.5px}
  input,select{font-family:"Nanum Myeongjo",serif;background:rgba(0,0,0,.25);
    color:var(--parch);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px}
  input[type=number]{width:52px;text-align:center}
  input.scoreIn.ov{border-color:var(--gold);color:var(--gold-bright);font-weight:700}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--velvet-2);border:1px solid var(--gold);color:var(--parch);
    padding:10px 18px;border-radius:24px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  /* player */
  .hexwrap{display:flex;justify-content:center;margin:6px 0 14px}
  .gemrow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px dashed rgba(216,185,120,.15)}
  .gemrow b{color:var(--parch)}
  .mission{border:1px solid var(--g6);background:rgba(167,127,201,.08);border-radius:14px;padding:18px;margin-top:6px}
  .mission .h{font-family:"Song Myung",serif;color:#C9A6E4;letter-spacing:.08em;margin-bottom:8px}
  .vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:8px}
  .vote-grid button{width:100%}
  .vote-grid button.on{background:var(--gold);color:#241a06;border-color:var(--gold);font-weight:700}
  /* admin table */
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:13px;min-width:760px}
  th,td{border:1px solid rgba(216,185,120,.16);padding:7px 8px;text-align:center;white-space:nowrap}
  th{color:var(--gold);font-weight:400;letter-spacing:.05em;position:sticky;top:0;background:var(--velvet)}
  td.name{text-align:left;white-space:normal}
  .rank1{color:var(--gold-bright);font-weight:700}
  .pill{font-size:11px;padding:2px 8px;border-radius:12px;border:1px solid var(--line)}
  .link{font-size:11.5px;color:var(--gold);word-break:break-all}
  .center{text-align:center}
  .toggle{display:flex;gap:8px;align-items:center}
  .hint{font-size:12px;color:var(--parch-dim);line-height:1.7}
  /* 초대장 캐러셀 */
  .inv-carousel{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;
    padding:2px 2px 12px;-webkit-overflow-scrolling:touch}
  .inv-carousel::-webkit-scrollbar{height:6px}
  .inv-carousel::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .inv-slide{flex:0 0 86%;scroll-snap-align:center;box-sizing:border-box;
    border:1px solid var(--line);border-radius:16px;padding:16px;min-height:236px;
    background:linear-gradient(180deg,rgba(216,185,120,.06),rgba(216,185,120,.015));
    display:flex;flex-direction:column;gap:10px}
  .inv-hero{width:100%;height:148px;border-radius:12px;object-fit:cover;border:1px solid var(--line)}
  .inv-hero.ph{display:flex;align-items:center;justify-content:center;
    background:radial-gradient(90px 90px at 50% 40%, rgba(241,217,156,.28), rgba(241,217,156,0) 70%),
      linear-gradient(160deg,var(--velvet-2),var(--velvet))}
  .inv-hero.ph::after{content:'👑';font-size:42px;opacity:.5}
  .inv-badges{margin-top:2px}
  .gembadge{display:inline-block;font-size:11px;color:var(--gold);border:1px solid var(--line);
    border-radius:12px;padding:2px 8px;margin-right:4px}
  .inv-title{font-family:'Song Myung',serif;color:var(--gold-bright);font-size:17px;letter-spacing:.04em}
  .inv-meta{font-size:12px;color:var(--parch-dim)}
  .inv-desc{font-size:13px;line-height:1.7}
  .inv-mission{margin-top:auto;padding:10px 12px;border:1px dashed var(--line);border-radius:10px;
    background:rgba(216,185,120,.05);font-size:13px;line-height:1.7}
  .inv-slide.locked{align-items:center;justify-content:center;text-align:center;gap:12px;
    color:var(--parch-dim);border-style:dashed;opacity:.5;filter:grayscale(.35)}
  .inv-slide.locked .lock{font-size:40px}
  .inv-hint{font-size:11px;color:var(--parch-dim);text-align:center;letter-spacing:.06em}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="crest"><div class="t">여섯 보석의 궁정</div><div class="s">THE COURT OF SIX JEWELS</div></div>
  <div class="card"><p class="muted center">불러오는 중…</p></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===== 설정: 배포한 Apps Script /exec URL 을 여기에 붙여넣으세요 ===== */
const API_URL = "https://script.google.com/macros/s/AKfycbwdFOvcE6q_qjN79v1cGFZf4cPXQJshXpCqoGUgCkLnYhxpBoKEHx06CDM9LU7EjYCX/exec";

const GEMS = [
  {k:'grace', ko:'우아', c:'var(--g1)', em:'🩰'},
  {k:'craft', ko:'솜씨', c:'var(--g2)', em:'🧺'},
  {k:'taste', ko:'미각', c:'var(--g3)', em:'🍪'},
  {k:'poise', ko:'품위', c:'var(--g4)', em:'🍽'},
  {k:'wit',   ko:'지혜', c:'var(--g5)', em:'💎'},
  {k:'charm', ko:'매력', c:'var(--g6)', em:'💞'},
];
const VOTE_GEMS = ['grace','craft','taste','poise'];   // 항목투표 채점 (지혜·매력은 퀴즈 합산)
function gemBadges(gemStr){
  return String(gemStr||'').split(',').map(s=>s.trim()).filter(Boolean).map(k=>{
    const g = GEMS.find(x=>x.k===k); return g?`<span class="gembadge">${g.em} ${g.ko}</span>`:'';
  }).join(' ');
}

const qs = new URLSearchParams(location.search);
const app = document.getElementById('app');

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }

async function api(action, params={}, post=false){
  const all = Object.assign({action}, params);
  if(!post){
    const u = new URL(API_URL);
    Object.keys(all).forEach(k=>u.searchParams.set(k, all[k]));
    const r = await fetch(u); return r.json();
  } else {
    const r = await fetch(API_URL, {method:'POST', body:JSON.stringify(all)});
    return r.json();
  }
}

function crest(){ return `<div class="crest"><div class="t">여섯 보석의 궁정</div><div class="s">THE COURT OF SIX JEWELS</div></div>`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------------- 세션 ---------------- */
function saveSession(s){ try{ localStorage.setItem('court_session', JSON.stringify(s)); }catch(e){} }
function loadSession(){ try{ return JSON.parse(localStorage.getItem('court_session')); }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem('court_session'); }catch(e){} }
function logout(){ clearSession(); renderLogin(); }
function logoutBar(){ return `<div class="center" style="margin-top:6px"><button class="sm" id="logoutBtn">로그아웃</button></div>`; }
function bindLogout(){ const b=document.getElementById('logoutBtn'); if(b) b.onclick=logout; }

/* ---------------- 라우팅 ---------------- */
async function boot(){
  if(API_URL.indexOf('PASTE_')===0){
    app.innerHTML = crest()+`<div class="card"><h2 class="sec">설정 필요</h2><p class="hint">court.html 안 <b>API_URL</b> 에 배포한 Apps Script /exec 주소를 넣어주세요.</p></div>`;
    return;
  }
  const s = loadSession();
  if(s && s.role==='admin')  return renderAdmin(s.key);
  if(s && s.role==='player') return renderPlayer(s.id, s.key);
  renderLogin();
}

/* ---------------- 로그인 화면 ---------------- */
async function renderLogin(){
  let roster = [];
  try{ const r = await api('roster', {}); if(r.ok) roster = r.players; }catch(e){}
  const opts = roster.map(p=>`<option value="${esc(p.id)}">${esc(p.princess||p.name)}</option>`).join('');
  app.innerHTML = crest()+`
   <div class="card" style="max-width:380px;margin:0 auto">
     <h2 class="sec">입궁</h2>
     <p class="hint" style="margin-bottom:14px">이름을 고르고 비밀번호를 입력하세요.</p>
     <div style="display:flex;flex-direction:column;gap:12px">
       <select id="who" style="width:100%">
         <option value="">— 영애를 선택 —</option>
         ${opts}
         <option value="__admin__">집사 (운영자)</option>
       </select>
       <input type="password" id="pw" placeholder="비밀번호" style="width:100%">
       <button class="gold" id="loginBtn">입궁하기</button>
       <p class="hint" id="loginMsg" style="color:var(--bad);min-height:16px"></p>
     </div>
   </div>`;
  const doLogin = async ()=>{
    const who = document.getElementById('who').value;
    const pw  = document.getElementById('pw').value.trim();
    const msg = document.getElementById('loginMsg');
    if(!who){ msg.textContent='이름을 선택해 주세요.'; return; }
    if(!pw){ msg.textContent='비밀번호를 입력해 주세요.'; return; }
    msg.textContent='확인 중…';
    try{
      if(who==='__admin__'){
        const d = await api('all', {key:pw});
        if(d.ok){ saveSession({role:'admin', key:pw}); renderAdmin(pw); }
        else msg.textContent='비밀번호가 올바르지 않아요.';
      } else {
        const d = await api('me', {id:who, key:pw});
        if(d.ok){ saveSession({role:'player', id:who, key:pw}); renderPlayer(who, pw); }
        else msg.textContent='비밀번호가 올바르지 않아요.';
      }
    }catch(e){ msg.textContent='연결에 문제가 있어요. 잠시 후 다시 시도해 주세요.'; }
  };
  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}

/* ---------------- 영애 화면 ---------------- */
async function renderPlayer(id, key){
  const d = await api('me', {id, key});
  if(!d.ok){ clearSession(); return renderLogin(); }

  let html = crest();
  html += `<div class="card"><div class="row" style="justify-content:space-between">
     <div><div style="font-family:'Song Myung';font-size:22px;color:var(--gold-bright)">${esc(d.princess||d.name)}</div>
     <div class="muted" style="font-size:12px;margin-top:4px">${esc(d.name||'')}</div></div>
     <span class="badge">${esc(d.pot||'')} 팟</span></div></div>`;

  // 초대장 (좌우 캐러셀)
  if(d.invitations && d.invitations.length){
    let slides = '';
    d.invitations.forEach(inv=>{
      if(inv.locked){
        slides += `<div class="inv-slide locked"><span class="lock">🔒</span><div>봉인된 초대장<br><span style="font-size:11px">집사가 열면 공개됩니다</span></div></div>`;
        return;
      }
      const hero = inv.image ? `<img src="${esc(inv.image)}" class="inv-hero" alt="">` : `<div class="inv-hero ph"></div>`;
      const meta = [esc(inv.time||''), esc(inv.place||'')].filter(Boolean).join(' · ');
      slides += `<div class="inv-slide">
        ${hero}
        <div class="inv-badges">${gemBadges(inv.gem)}</div>
        <div class="inv-title">${esc(inv.title||'')}</div>
        <div class="inv-meta">${meta}${inv.address?`<br><span style="font-size:11px">${esc(inv.address)}</span>`:''}</div>
        ${inv.description?`<p class="inv-desc">${esc(inv.description)}</p>`:''}
        ${inv.mission?`<div class="inv-mission">📜 ${esc(inv.mission)}</div>`:`<div class="inv-mission muted">이 자리의 미션은 곧 전해집니다.</div>`}
      </div>`;
    });
    html += `<div class="card"><h2 class="sec">초대장</h2>
      <div class="inv-carousel" id="invCarousel">${slides}</div>
      <div class="inv-hint">← 좌우로 넘겨보세요 →</div></div>`;
  }

  // 우승 발표
  if(d.winner_revealed){
    html += `<div class="card center">${d.am_i_winner
      ? `<div style="font-family:'Song Myung';font-size:24px;color:var(--gold-bright)">👑 대관을 축하드립니다</div><p class="muted" style="margin-top:8px">오늘의 공주는 영애님이십니다.</p>`
      : `<p class="muted">대관식이 끝났어요. 오늘의 공주가 정해졌습니다.</p>`}</div>`;
  }

  // 점수 (공개 시)
  if(d.reveal && d.gems){
    html += `<div class="card"><h2 class="sec">나의 육각형</h2><div class="hexwrap">${hexSVG(d.gems, d.scale)}</div>`;
    GEMS.forEach(g=>{ html += `<div class="gemrow"><span>${g.ko}</span><b>${d.gems[g.k]}점</b></div>`; });
    html += `<div class="gemrow" style="border:none;margin-top:8px"><span>합계</span><b>${d.total}</b></div>
             <div class="gemrow" style="border:none"><span>균형 점수</span><b style="color:var(--gold-bright)">${d.balance}</b></div>
             <p class="hint" style="margin-top:8px">점수는 항목별 투표로 산정돼요. 균형 점수 = 합계 − (최고−최저). 고르게 빛날수록 높아요.</p></div>`;
  } else {
    html += `<div class="card center"><p class="muted">점수는 대관식에서 공개됩니다. ✨</p></div>`;
  }

  // 비밀 미션 (집사의 영애만)
  if(d.is_owner){
    html += `<div class="card"><div class="mission"><div class="h">🤫 집사의 영애 — 비밀 임무</div>
      <p style="line-height:1.8">${esc(d.mission||'(임무가 곧 전달됩니다)')}</p>
      <p class="hint" style="margin-top:10px">상태: <b>${esc(d.mission_status||'진행 중')}</b><br>아무에게도 들키지 마세요. 끝까지 정체를 숨기시길.</p></div></div>`;
  }

  // 투표
  if(d.voting_open){
    html += `<div class="card"><h2 class="sec">집사의 영애는 누구일까요?</h2>
      <p class="hint">하루를 돌아보고, 집사가 남몰래 모신 단 한 분을 지목해 주세요.</p>
      <div class="vote-grid" id="voteGrid">${
        d.others.map(o=>`<button data-id="${esc(o.id)}" class="voteBtn ${d.voted&&d.my_guess===o.id?'on':''}">${esc(o.princess)}</button>`).join('')
      }</div>
      <p class="hint" id="voteMsg" style="margin-top:10px">${d.voted?'투표가 접수되었어요. 바꾸려면 다시 눌러주세요.':''}</p></div>`;
  }

  // 항목별 투표 (각 보석마다 1·2·3위 지명)
  if(d.gem_voting_open){
    const cand = d.others || [];
    html += `<div class="card"><h2 class="sec">항목별 투표</h2>
      <p class="hint">항목마다 제일 잘한 분을 1·2·3위로 뽑아주세요. <b>1위 5점 · 2위 3점 · 3위 1점</b> (본인 제외). 고르면 자동 저장돼요.</p>`;
    GEMS.filter(g=>VOTE_GEMS.includes(g.k)).forEach(g=>{
      const mv = (d.my_gem_votes && d.my_gem_votes[g.k]) || ['','',''];
      const sel = (rank,val)=>`<select class="gemSel" data-cat="${g.k}" data-rank="${rank}">
          <option value="">—</option>
          ${cand.map(o=>`<option value="${esc(o.id)}" ${String(val)===String(o.id)?'selected':''}>${esc(o.princess)}</option>`).join('')}
        </select>`;
      html += `<div style="margin:10px 0;padding:12px;border:1px solid var(--line);border-radius:12px">
         <div style="color:var(--gold);margin-bottom:8px">${g.ko}</div>
         <div class="row"><span class="muted" style="font-size:12px">1위</span>${sel(1,mv[0])}
            <span class="muted" style="font-size:12px">2위</span>${sel(2,mv[1])}
            <span class="muted" style="font-size:12px">3위</span>${sel(3,mv[2])}</div>
      </div>`;
    });
    html += `</div>`;
  }

  app.innerHTML = html + logoutBar();
  bindLogout();

  // 캐러셀: 가장 최근(오더 큰) 공개된 초대장으로 스크롤
  const car = document.getElementById('invCarousel');
  if(car && d.invitations){
    let target = -1;
    d.invitations.forEach((inv,i)=>{ if(!inv.locked) target = i; });
    const s = car.querySelectorAll('.inv-slide')[target];
    if(s) car.scrollLeft = s.offsetLeft - (car.clientWidth - s.clientWidth)/2;
  }

  if(d.voting_open){
    document.querySelectorAll('.voteBtn').forEach(b=>{
      b.onclick = async ()=>{
        const g = b.getAttribute('data-id');
        const r = await api('vote', {id, key, guess:g}, true);
        if(r.ok){
          document.querySelectorAll('.voteBtn').forEach(x=>x.classList.remove('on'));
          b.classList.add('on');
          document.getElementById('voteMsg').textContent = '투표가 접수되었어요. 바꾸려면 다시 눌러주세요.';
          toast('지목 완료 🤍');
        } else { toast(r.error==='voting_closed'?'투표가 마감되었어요':'오류가 발생했어요'); }
      };
    });
  }

  if(d.gem_voting_open){
    const saveCat = async (cat)=>{
      const val = r => (document.querySelector(`.gemSel[data-cat="${cat}"][data-rank="${r}"]`)||{}).value || '';
      const r = await api('gemVote', {id, key, category:cat, rank1:val(1), rank2:val(2), rank3:val(3)}, true);
      toast(r.ok ? '투표 저장됨 🤍' : (r.error==='gem_voting_closed'?'투표가 마감되었어요':'오류가 발생했어요'));
    };
    document.querySelectorAll('.gemSel').forEach(s=>{
      s.onchange = ()=>{
        const cat = s.dataset.cat;
        // 같은 항목 안 중복 지명 방지: 방금 고른 값과 겹치는 다른 칸 비우기
        document.querySelectorAll(`.gemSel[data-cat="${cat}"]`).forEach(x=>{ if(x!==s && x.value && x.value===s.value) x.value=''; });
        saveCat(cat);
      };
    });
  }
}

/* 육각형 레이더 SVG */
function hexSVG(gems, scale){
  scale = Number(scale)||10;
  const cx=110, cy=110, R=88;
  const ang = i => (-90 + i*60) * Math.PI/180;
  const pt = (i,r)=>[cx + r*Math.cos(ang(i)), cy + r*Math.sin(ang(i))];
  let grid='';
  [0.25,0.5,0.75,1].forEach(f=>{
    const p = GEMS.map((_,i)=>pt(i,R*f).map(n=>n.toFixed(1)).join(',')).join(' ');
    grid += `<polygon points="${p}" fill="none" stroke="rgba(216,185,120,.18)"/>`;
  });
  let axes='', labels='';
  GEMS.forEach((g,i)=>{
    const e=pt(i,R), l=pt(i,R+16);
    axes += `<line x1="${cx}" y1="${cy}" x2="${e[0].toFixed(1)}" y2="${e[1].toFixed(1)}" stroke="rgba(216,185,120,.18)"/>`;
    labels += `<text x="${l[0].toFixed(1)}" y="${l[1].toFixed(1)}" fill="var(--parch-dim)" font-size="11" text-anchor="middle" dominant-baseline="middle" font-family="Song Myung">${g.ko}</text>`;
  });
  const vpts = GEMS.map((g,i)=>pt(i, R*(Number(gems[g.k])||0)/scale).map(n=>n.toFixed(1)).join(',')).join(' ');
  return `<svg viewBox="0 0 220 220" width="240" height="240">${grid}${axes}
    <polygon points="${vpts}" fill="rgba(216,185,120,.28)" stroke="var(--gold-bright)" stroke-width="2"/>
    ${labels}</svg>`;
}

/* ---------------- 집사(admin) 화면 ---------------- */
async function renderAdmin(key){
  const d = await api('all', {key});
  if(!d.ok){ clearSession(); return renderLogin(); }

  const ranked = [...d.players].sort((a,b)=> b.balance - a.balance);
  const reveal = truthy(d.config.reveal_scores), voting = truthy(d.config.voting_open), gemVoting = truthy(d.config.gem_voting_open);
  const winnerId = d.config.winner_id;
  const base = location.origin + location.pathname;

  let html = crest();

  // 컨트롤
  html += `<div class="card"><h2 class="sec">집사 콘솔</h2>
    <div class="row" style="gap:18px">
      <label class="toggle"><input type="checkbox" id="tReveal" ${reveal?'checked':''}> 점수 공개</label>
      <label class="toggle"><input type="checkbox" id="tGemVote" ${gemVoting?'checked':''}> 항목 투표 열기</label>
      <label class="toggle"><input type="checkbox" id="tVote" ${voting?'checked':''}> 스파이 투표 열기</label>
    </div>
    <p class="hint" style="margin-top:10px">항목 투표를 켜면 영애들이 6항목 1·2·3위를 지명하고, 그 결과로 점수가 자동 집계돼요. 점수 공개는 대관식 전까지 꺼두는 걸 권해요.</p></div>`;

  // 순위
  html += `<div class="card"><h2 class="sec">순위 (균형 점수)</h2><div class="scroll"><table>
    <tr><th>#</th><th>영애</th><th>팟</th>${GEMS.map(g=>`<th>${g.ko}</th>`).join('')}<th>합계</th><th>균형</th><th>우승</th></tr>`;
  ranked.forEach((p,idx)=>{
    html += `<tr>
      <td class="${idx===0?'rank1':''}">${idx+1}</td>
      <td class="name ${idx===0?'rank1':''}">${esc(p.princess||p.name)} ${p.is_owner?'🤫':''} ${p.is_leader?'👁':''}<div class="muted" style="font-size:11px">${esc(p.name||'')}</div></td>
      <td>${esc(p.pot||'')}</td>
      ${GEMS.map(g=> VOTE_GEMS.includes(g.k)
        ? `<td><input type="number" min="0" value="${p.gems[g.k]}" data-id="${esc(p.id)}" data-gem="${g.k}" class="scoreIn${p.overridden&&p.overridden[g.k]?' ov':''}" title="${p.overridden&&p.overridden[g.k]?'수동 고정 — 지우면 투표 집계값으로 복귀':'투표 집계값 — 숫자를 넣으면 수동 고정'}"></td>`
        : `<td class="muted" title="퀴즈 합산 (아래 퀴즈 점수에서 관리)">${p.gems[g.k]}</td>`).join('')}
      <td>${p.total}</td><td class="${idx===0?'rank1':''}">${p.balance}</td>
      <td><button class="sm winBtn ${String(winnerId)===String(p.id)?'gold':''}" data-id="${esc(p.id)}">${String(winnerId)===String(p.id)?'👑':'선택'}</button></td>
    </tr>`;
  });
  html += `</table></div><p class="hint" style="margin-top:8px">우아·솜씨·미각·품위는 항목투표 자동 집계(숫자 입력=수동 고정 금색, 지우면 복귀). <b>지혜·매력은 아래 "퀴즈 점수" 합산</b>이라 여기선 읽기 전용. 🤫=집사의 영애, 👁=팟장.</p></div>`;

  // 항목별 투표 집계 (우아·솜씨·미각·품위)
  html += `<div class="card"><h2 class="sec">항목별 투표 집계</h2><div class="scroll"><table>
    <tr><th>항목</th><th>순위 (득점)</th></tr>
    ${GEMS.filter(g=>VOTE_GEMS.includes(g.k)).map(g=>{
      const list = (d.gem_tally && d.gem_tally[g.k]) || [];
      const txt = list.length ? list.map((x,i)=>`${i+1}. ${esc(x.name)} (${x.points})`).join(' · ') : '<span class="muted">아직 투표 없음</span>';
      return `<tr><td>${g.em} ${g.ko}</td><td class="name">${txt}</td></tr>`;
    }).join('')}
  </table></div><p class="hint" style="margin-top:8px">1위 5점 · 2위 3점 · 3위 1점.</p></div>`;

  // 초대장 공개
  html += `<div class="card"><h2 class="sec">초대장 공개</h2>`;
  if(!d.invitations || !d.invitations.length){ html += `<p class="muted">Invitations 탭이 아직 없어요.</p>`; }
  else {
    html += `<div class="row" style="flex-direction:column;align-items:stretch;gap:10px">`;
    d.invitations.forEach(inv=>{
      html += `<label class="toggle" style="justify-content:space-between;border:1px solid var(--line);border-radius:10px;padding:10px 12px">
        <span>${gemBadges(inv.gem)} <b>${esc(inv.title||inv.inv_id)}</b></span>
        ${inv.always_open
          ? `<span class="pill">항상 공개</span>`
          : `<input type="checkbox" class="invChk" data-inv="${esc(inv.inv_id)}" ${inv.is_open?'checked':''}>`}
      </label>`;
    });
    html += `</div><p class="hint" style="margin-top:8px">켜면 영애 화면에 해당 초대장이 나타나요. (전체 이벤트=항상 공개)</p>`;
  }
  html += `</div>`;

  // 퀴즈 점수 (지혜·매력)
  html += `<div class="card"><h2 class="sec">퀴즈 점수 (지혜·매력)</h2>`;
  if(!d.quizzes || !d.quizzes.length){ html += `<p class="muted">Quizzes 탭이 아직 없어요.</p>`; }
  else {
    html += `<div class="scroll"><table><tr><th>영애</th>${d.quizzes.map(q=>`<th title="${esc(q.gem)} / 최대 ${esc(q.max)}">${esc(q.label||q.quiz_id)}</th>`).join('')}</tr>`;
    d.players.forEach(p=>{
      const sc = (d.quiz_scores && d.quiz_scores[p.id]) || {};
      html += `<tr><td class="name">${esc(p.princess||p.name)}</td>${d.quizzes.map(q=>`<td><input type="number" min="0" ${q.max!==''&&q.max!=null?`max="${esc(q.max)}"`:''} value="${sc[q.quiz_id]!=null?esc(sc[q.quiz_id]):''}" data-pid="${esc(p.id)}" data-qid="${esc(q.quiz_id)}" class="quizIn"></td>`).join('')}</tr>`;
    });
    html += `</table></div><p class="hint" style="margin-top:8px">gem이 wit인 퀴즈 합=지혜, charm 합=매력. 숫자를 바꾸면 자동 저장돼요.</p>`;
  }
  html += `</div>`;

  // 역할/미션
  html += `<div class="card"><h2 class="sec">역할 · 비밀 미션</h2><div class="scroll"><table>
    <tr><th>영애</th><th>집사의 영애</th><th>팟장</th><th>미션 내용</th><th>상태</th></tr>`;
  d.players.forEach(p=>{
    html += `<tr>
      <td class="name">${esc(p.princess||p.name)}</td>
      <td><input type="checkbox" class="ownerChk" data-id="${esc(p.id)}" ${p.is_owner?'checked':''}></td>
      <td><input type="checkbox" class="leadChk" data-id="${esc(p.id)}" ${p.is_leader?'checked':''}></td>
      <td><input type="text" class="missIn" data-id="${esc(p.id)}" value="${esc(p.mission)}" placeholder="비밀 미션…" style="width:200px"></td>
      <td><select class="statSel" data-id="${esc(p.id)}">
        ${['진행 중','완수','오후 발각','오전 발각'].map(s=>`<option ${p.mission_status===s?'selected':''}>${s}</option>`).join('')}
      </select></td></tr>`;
  });
  html += `</table></div><p class="hint" style="margin-top:8px">집사의 영애는 한 명만 지정돼요(다른 체크는 자동 해제). 미션 칸은 Enter로 저장.</p></div>`;

  // 투표 집계
  html += `<div class="card"><h2 class="sec">투표 집계 — "집사의 영애 지목"</h2>`;
  if(d.votes.length===0){ html += `<p class="muted">아직 투표가 없어요.</p>`; }
  else {
    const correct = d.votes.filter(v=>v.correct).length;
    html += `<p class="hint">정답자 ${correct} / ${d.votes.length}명</p><div class="scroll"><table>
      <tr><th>영애</th><th>지목</th><th>정답?</th></tr>
      ${d.votes.map(v=>`<tr><td class="name">${esc(v.voter)}</td><td>${esc(v.guess)}</td>
        <td>${v.correct===null?'-':(v.correct?'✅':'❌')}</td></tr>`).join('')}</table></div>`;
  }
  html += `</div>`;

  // 비밀번호 배포
  html += `<div class="card"><h2 class="sec">영애별 비밀번호</h2><p class="hint">각 영애에게 <b>이름과 비밀번호</b>를 알려주세요. 사이트에서 이름을 고르고 이 비밀번호로 입궁합니다. (집사는 로그인 시 "집사"를 골라 admin key 입력)</p><div class="scroll"><table>
    <tr><th>영애</th><th>비밀번호</th><th></th></tr>
    ${d.players.map(p=>{
      return `<tr><td class="name">${esc(p.princess||p.name)}</td><td class="link">${esc(p.key)}</td>
        <td><button class="sm copyBtn" data-copy="${esc(p.key)}">복사</button></td></tr>`;
    }).join('')}
  </table></div></div>`;

  app.innerHTML = html + logoutBar();
  bindAdmin(key);
  bindLogout();
}

function bindAdmin(key){
  const save = async (params)=>{ const r = await api(params.action, Object.assign({key},params), true); toast(r.ok?'저장됐어요':'오류: '+(r.error||'')); return r; };

  document.getElementById('tReveal').onchange  = e => save({action:'setToggle', name:'reveal_scores',   value: e.target.checked});
  document.getElementById('tVote').onchange    = e => save({action:'setToggle', name:'voting_open',     value: e.target.checked});
  document.getElementById('tGemVote').onchange = e => save({action:'setToggle', name:'gem_voting_open', value: e.target.checked});

  document.querySelectorAll('.scoreIn').forEach(inp=>{
    inp.onchange = ()=> save({action:'setScore', id:inp.dataset.id, gem:inp.dataset.gem, value:inp.value});
  });
  document.querySelectorAll('.ownerChk').forEach(c=>{
    c.onchange = async ()=>{ await save({action:'setField', id:c.dataset.id, field:'is_owner', value:c.checked}); if(c.checked) setTimeout(()=>renderAdmin(key),400); };
  });
  document.querySelectorAll('.leadChk').forEach(c=>{
    c.onchange = ()=> save({action:'setField', id:c.dataset.id, field:'is_leader', value:c.checked});
  });
  document.querySelectorAll('.missIn').forEach(inp=>{
    inp.onkeydown = e=>{ if(e.key==='Enter') save({action:'setField', id:inp.dataset.id, field:'mission', value:inp.value}); };
  });
  document.querySelectorAll('.statSel').forEach(sel=>{
    sel.onchange = ()=> save({action:'setField', id:sel.dataset.id, field:'mission_status', value:sel.value});
  });
  document.querySelectorAll('.winBtn').forEach(b=>{
    b.onclick = async ()=>{ await save({action:'setWinner', id:b.dataset.id}); setTimeout(()=>renderAdmin(key),400); };
  });
  document.querySelectorAll('.copyBtn').forEach(b=>{
    b.onclick = ()=>{ navigator.clipboard.writeText(b.dataset.copy); toast('비밀번호 복사됨'); };
  });
  document.querySelectorAll('.invChk').forEach(c=>{
    c.onchange = ()=> save({action:'setInvOpen', inv_id:c.dataset.inv, value:c.checked});
  });
  document.querySelectorAll('.quizIn').forEach(inp=>{
    inp.onchange = ()=> save({action:'setQuizScore', player_id:inp.dataset.pid, quiz_id:inp.dataset.qid, value:inp.value});
  });
}

function truthy(v){ return v===true || String(v).toUpperCase()==='TRUE' || v===1 || v==='1'; }

boot();
</script>
